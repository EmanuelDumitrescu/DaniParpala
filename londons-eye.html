<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>London's Eye - Daniel Parpala</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .project-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .project-image {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .project-image:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .project-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 2rem;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .back-button:hover {
            background-color: #0056b3;
        }

        /* Lightbox Modal */
        .lightbox-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            animation: fadeIn 0.3s ease-in;
        }

        .lightbox-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
        }

        .lightbox-content img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .close-lightbox {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .close-lightbox:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Daniel Parpala</h1>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gallery.html">My Work</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Project Section -->
    <section class="section">
        <div class="container">
            <a href="gallery.html" class="back-button">← Back to Gallery</a>
            
            <h2>London's Eye Project</h2>
            <p style="text-align: center; color: #666; margin-bottom: 2rem;">A beautiful collection of paintings from the iconic London's Eye</p>

            <div class="project-gallery">
                <div class="project-image" onclick="openLightbox('images/London\'s Eye/1.jpg')">
                    <img src="images/London's Eye/1.jpg" alt="London's Eye - Image 1">
                </div>
                <div class="project-image" onclick="openLightbox('images/London\'s Eye/2.jpg')">
                    <img src="images/London's Eye/2.jpg" alt="London's Eye - Image 2">
                </div>
                <div class="project-image" onclick="openLightbox('images/London\'s Eye/3.jpg')">
                    <img src="images/London's Eye/3.jpg" alt="London's Eye - Image 3">
                </div>
                <div class="project-image" onclick="openLightbox('images/London\'s Eye/4.jpg')">
                    <img src="images/London's Eye/4.jpg" alt="London's Eye - Image 4">
                </div>
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div id="lightboxModal" class="lightbox-modal" onclick="if(event.target === this) closeLightbox()">
        <div class="lightbox-content">
            <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
            <img id="lightboxImage" src="" alt="Enlarged Image">
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Daniel Parpala. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
